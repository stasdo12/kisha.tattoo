name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Lint + Type-check + Test + Build ─────────────────────────────────────
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run type-check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          TELEGRAM_BOT_TOKEN: placeholder
          TELEGRAM_CHAT_ID: placeholder

  # ─── Deploy to VPS via SSH (main branch only) ─────────────────────────────
  deploy:
    name: Deploy → VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          printf '%s\n' "$VPS_SSH_KEY" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no root@94.130.96.166 "
            set -e
            cd /var/www/kishatattoo
            git pull origin main
            npm ci
            npm run build
            pm2 restart kishatattoo
          "
          rm -f /tmp/deploy_key